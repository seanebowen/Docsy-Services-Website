kind = "web"
previewPath = "/"
title = "Docsy Notary Services"
version = "1.0.0"
id = "artifacts/docsy-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23359

[services.development]
run = "pnpm --filter @workspace/docsy-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/docsy-website", "run", "build" ]
publicDir = "artifacts/docsy-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23359"
BASE_PATH = "/"
